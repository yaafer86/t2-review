version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ollama_chat_postgres
    environment:
      POSTGRES_USER: ollama
      POSTGRES_PASSWORD: ollama_password
      POSTGRES_DB: ollama_chat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollama -d ollama_chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ollama_chat_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ollama_chat_backend
    environment:
      DATABASE_URL: postgresql://ollama:ollama_password@postgres:5432/ollama_chat
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin_password
      OLLAMA_HOST: http://host.docker.internal:11434
      SANDBOX_NETWORK: sandbox_network
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ollama_chat_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:

networks:
  default:
    name: ollama_chat_network
  sandbox_network:
    name: sandbox_network
    driver: bridge
